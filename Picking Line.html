<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picking Oriflame</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0b0f19;
            --panel: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
            --text: #f1f5f9;
        }

        body, html { 
            height: 100%; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }
        
        .layout { display: flex; flex-direction: column; height: 100vh; }
        .top-container { flex-shrink: 0; z-index: 1000; background: var(--bg); }
        .header-fixed { background: var(--panel); padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .scan-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            background: rgba(56, 189, 248, 0.07); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--accent); 
        }

        input, select { 
            padding: 12px; 
            background: #0b0f19; 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 8px; 
            outline: none; 
            width: 100%;
            box-sizing: border-box;
        }

        .table-header-fixed {
            background: #1a2233;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
        }

        .header-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 1.5fr 1fr 0.5fr;
            max-width: 1300px;
            margin: 0 auto;
            padding: 15px 10px;
        }

        .header-row span {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 0 20px 40px 20px; }
        .table-body-container { background: var(--panel); border-radius: 0 0 12px 12px; border: 1px solid var(--border); width: 100%; max-width: 1300px; margin: 0 auto; }

        .data-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 1.5fr 1fr 0.5fr;
            padding: 15px 10px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .active-row { background: rgba(56, 189, 248, 0.2) !important; border-left: 5px solid var(--accent); scroll-margin-top: 10px; }
        .status-completed { color: var(--success); font-weight: bold; font-size: 0.85rem; }
        .status-scanning { color: var(--accent); font-weight: bold; animation: blink 1.5s infinite; font-size: 0.85rem; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .count-badge { background: var(--accent); color: #000; padding: 2px 12px; border-radius: 20px; font-weight: bold; }
        .btn-del { background: var(--danger); border: none; color: white; cursor: pointer; border-radius: 6px; padding: 8px 12px; font-weight: bold; }

        #msg { position: fixed; top: 20px; left: 20px; right: 20px; padding: 20px; border-radius: 12px; display: none; z-index: 2000; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="msg"></div>

<div id="welcomeView" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div style="text-align:center; width: 90%; max-width: 400px;">
        <h2 style="color:var(--accent); margin-bottom: 30px;">SISTEMA DE PICKING ORIFLAME</h2>
        <label style="display:block; padding:20px; background:var(--accent); color:#000; border-radius:12px; font-weight:bold; cursor:pointer; margin-bottom:20px;">
            CARGAR LINEA DE PICKING
            <input type="file" id="excelInput" hidden accept=".xlsx, .xls">
        </label>
        <button onclick="enterLiveSession()" style="width:100%; padding:20px; background:transparent; border:2px solid var(--accent); color:var(--accent); border-radius:12px; font-weight:bold; cursor:pointer;">
            PANEL DE PITADO
        </button>
    </div>
</div>

<div id="mainView" class="layout" style="display: none;">
    <div class="top-container">
        <div class="header-fixed">
            <div class="header-top">
                <h3 style="margin:0;">LINEA DE PICKING <small style="color:var(--accent)">| Oriflame</small></h3>
                <button onclick="location.reload()" style="background:transparent; border:1px solid #94a3b8; color:#94a3b8; padding:5px 12px; border-radius:6px; cursor:pointer;">Menú Principal</button>
            </div>
            <div class="scan-container">
                <select id="activeStation" onchange="updateView()"></select>
                <button onclick="exportToExcel()" style="background:transparent; border:1px solid var(--accent); color:var(--accent); border-radius:8px; cursor:pointer;">Exportar Excel</button>
                <input type="text" id="barcodeInput" placeholder="Escanea código aquí..." autofocus>
                <button onclick="processScan()" style="background:var(--success); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">REGISTRAR</button>
                <button onclick="clearStationData()" style="background:var(--danger); border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">LIMPIAR TODO</button>
            </div>
        </div>
        <div class="table-header-fixed">
            <div class="header-row">
                <span>Ubicación</span><span>Pits</span><span>Código</span><span>Estado</span><span>Acción</span>
            </div>
        </div>
    </div>
    <div class="scroll-area"><div class="table-body-container" id="tableBody"></div></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyClp2tVcoeIE_ZOedIzP6zyEXEoP9Em0tM",
        authDomain: "chatpareja-3fbce.firebaseapp.com",
        databaseURL: "https://chatpareja-3fbce-default-rtdb.firebaseio.com",
        projectId: "chatpareja-3fbce",
        storageBucket: "chatpareja-3fbce.firebasestorage.app",
        messagingSenderId: "954583350974",
        appId: "1:954583350974:web:206cdca70f941872d728ef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let stationsData = {};
    let stationsList = [];
    let codeMap = new Map();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    db.ref('picking_live').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            stationsData = data.stationsData || {};
            stationsList = data.stationsList || [];
            codeMap = new Map(Object.entries(data.codeMap || {}));
            if (document.getElementById('mainView').style.display === 'flex') {
                initSelect(); updateView();
            }
        }
    });

    async function enterLiveSession() {
        const snapshot = await db.ref('picking_live/stationsList').once('value');
        if (!snapshot.exists()) return showNotify("No hay estaciones.", "var(--danger)");
        stationsList = snapshot.val();
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('mainView').style.display = 'flex';
        initSelect(); updateView();
        setTimeout(() => document.getElementById('barcodeInput').focus(), 100);
    }

    function processScan() {
        const input = document.getElementById('barcodeInput');
        const select = document.getElementById('activeStation');
        const code = input.value.trim();
        const station = select.value;

        if(!code) return;

        // Función interna para saltar a la siguiente ubicación
        const jumpToNext = () => {
            const nextIdx = (stationsList.indexOf(station) + 1) % stationsList.length;
            select.value = stationsList[nextIdx];
            input.value = '';
            input.focus();
            updateView();
        };

        // VALIDACIÓN: Ubicación Ocupada
        if (stationsData[station] && stationsData[station].length >= 1) {
            playTone(150, 'sawtooth', 0.5); // Sonido Error
            showNotify(`UBICACIÓN ${station} OCUPADA`, "var(--danger)");
            jumpToNext(); // SALTA A PESAR DEL ERROR
            return;
        }

        // VALIDACIÓN: Código Duplicado
        if(codeMap.has(code)) {
            playTone(150, 'sawtooth', 0.5); // Sonido Error
            showNotify(`DUPLICADO: Ubicación ${codeMap.get(code)}`, "var(--danger)");
            input.value = ''; return; // Aquí no salta de ubicación porque el operario debe corregir el código
        }

        // ÉXITO: Registro normal
        playTone(880, 'sine', 0.1); 
        const newEntry = { code: code, time: new Date().toLocaleTimeString() };
        
        // Actualización instantánea
        if(!stationsData[station]) stationsData[station] = [];
        stationsData[station] = [newEntry];
        codeMap.set(code, station);

        jumpToNext(); // SALTA A LA SIGUIENTE

        // Sincronización fondo
        db.ref(`picking_live/stationsData/${station}`).set([newEntry]);
        db.ref(`picking_live/codeMap/${code}`).set(station);
    }

    function updateView() {
        const container = document.getElementById('tableBody');
        const active = document.getElementById('activeStation').value;
        if (!container || !active) return;
        let content = '';
        stationsList.forEach(name => {
            const isActive = (name === active);
            const currentData = stationsData[name] || [];
            const hasData = currentData.length > 0;
            const lastEntry = hasData ? currentData[0] : { code: '-', time: '' };
            content += `<div class="data-row ${isActive ? 'active-row' : ''}" id="${isActive ? 'activeRow' : ''}">
                <div style="font-weight:bold">${name}</div>
                <div><span class="count-badge">${currentData.length}</span></div>
                <div style="font-family:monospace; color:#94a3b8">${lastEntry.code}</div>
                <div>${isActive ? '<span class="status-scanning">ESCANEANDO</span>' : (hasData ? '<span class="status-completed">COMPLETADO</span>' : 'Esperando')}</div>
                <div>${hasData ? `<button class="btn-del" onclick="deleteItem('${name}', '${lastEntry.code}')">X</button>` : ''}</div>
            </div>`;
        });
        container.innerHTML = content;
        const activeRow = document.getElementById('activeRow');
        if(activeRow) activeRow.scrollIntoView({ behavior: 'auto', block: 'nearest' });
    }

    function initSelect() {
        const select = document.getElementById('activeStation');
        const prev = select.value;
        select.innerHTML = stationsList.map(n => `<option value="${n}">${n}</option>`).join('');
        if(prev && stationsList.includes(prev)) select.value = prev;
    }

    function deleteItem(station, code) {
        if(!confirm(`¿Borrar el código ${code}?`)) return;
        stationsData[station] = []; codeMap.delete(code);
        updateView();
        db.ref(`picking_live/stationsData/${station}`).set([]);
        db.ref(`picking_live/codeMap/${code}`).remove();
    }

    function showNotify(text, color) {
        const m = document.getElementById('msg');
        m.innerHTML = text; m.style.backgroundColor = color;
        m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 3500);
    }

    document.getElementById('barcodeInput').addEventListener('keypress', e => { if(e.key === 'Enter') processScan(); });

    document.getElementById('excelInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            let tD = {}; let tL = [];
            json.forEach(row => {
                const name = row.Estacion || row.Nombre || row.UBICACION || Object.values(row)[0];
                if(name && !tD[name]) { tD[name] = []; tL.push(name); }
            });
            db.ref('picking_live').set({ stationsData: tD, stationsList: tL, codeMap: {} }).then(() => enterLiveSession());
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function clearStationData() {
        if(!confirm("¿BORRAR TODOS LOS REGISTROS?")) return;
        stationsList.forEach(st => stationsData[st] = []);
        codeMap.clear(); updateView();
        db.ref('picking_live/codeMap').set({});
        stationsList.forEach(st => db.ref(`picking_live/stationsData/${st}`).set([]));
    }

    function exportToExcel() {
        let exportData = [];
        stationsList.forEach(st => {
            (stationsData[st] || []).forEach(item => {
                exportData.push({ "Ubicación": st, "Código": item.code, "Hora": item.time });
            });
        });
        if(exportData.length === 0) return showNotify("Sin datos", "var(--danger)");
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Picking");
        XLSX.writeFile(wb, "Reporte_Picking_Oriflame.xlsx");
    }
</script>
</body>
</html>
