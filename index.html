<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picking Oriflame - Ultra Fast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0b0f19;
            --panel: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
            --text: #f1f5f9;
        }

        body, html { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        .layout { display: flex; flex-direction: column; height: 100vh; }
        .top-container { flex-shrink: 0; z-index: 1000; background: var(--bg); }
        .header-fixed { background: var(--panel); padding: 15px; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        
        .scan-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: rgba(56, 189, 248, 0.07); padding: 10px; border-radius: 8px; border: 1px solid var(--accent); 
        }
        #barcodeInput { grid-column: span 2; }

        input, select { padding: 10px; background: #0b0f19; border: 1px solid var(--border); color: white; border-radius: 6px; outline: none; width: 100%; box-sizing: border-box; }

        .table-header-fixed { background: #1a2233; padding: 0 15px; border-bottom: 2px solid var(--accent); }
        .header-row { display: grid; grid-template-columns: 1.2fr 0.8fr 1.5fr 1fr 0.5fr; padding: 15px 10px; }
        .header-row span { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; font-weight: bold; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 0 15px 40px 15px; }
        .table-body-container { background: var(--panel); border-radius: 0 0 12px 12px; border: 1px solid var(--border); width: 100%; }

        .data-row { display: grid; grid-template-columns: 1.2fr 0.8fr 1.5fr 1fr 0.5fr; padding: 12px 10px; border-bottom: 1px solid var(--border); align-items: center; font-size: 0.85rem; }
        .active-row { background: rgba(56, 189, 248, 0.2) !important; border-left: 5px solid var(--accent); }
        
        .status-completed { color: var(--success); font-weight: bold; font-size: 0.75rem; }
        .status-scanning { color: var(--accent); font-weight: bold; animation: blink 1.5s infinite; font-size: 0.75rem; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .count-badge { background: var(--accent); color: #000; padding: 2px 10px; border-radius: 15px; font-weight: bold; }
        .btn-del { background: var(--danger); border: none; color: white; border-radius: 4px; padding: 6px 10px; font-weight: bold; }
        #msg { position: fixed; top: 20px; left: 20px; right: 20px; padding: 20px; border-radius: 10px; display: none; z-index: 2000; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="msg"></div>

<div id="welcomeView" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div style="text-align:center; width:90%;">
        <h2 style="color:var(--accent);">PICKING ORIFLAME</h2>
        <label style="display:block; padding:20px; background:var(--accent); color:#000; border-radius:12px; font-weight:bold; margin-bottom:20px; cursor:pointer;">
            CARGAR EXCEL <input type="file" id="excelInput" hidden accept=".xlsx, .xls">
        </label>
        <button onclick="enterLiveSession()" style="width:100%; padding:20px; background:transparent; border:2px solid var(--accent); color:var(--accent); border-radius:12px; font-weight:bold;">ENTRAR AL PANEL</button>
    </div>
</div>

<div id="mainView" class="layout" style="display: none;">
    <div class="top-container">
        <div class="header-fixed">
            <div class="header-top">
                <h3 style="margin:0;">LINEA <small style="color:var(--accent)">| Oriflame</small></h3>
                <button onclick="location.reload()" style="background:transparent; border:1px solid #94a3b8; color:#94a3b8; padding:5px; border-radius:5px;">Salir</button>
            </div>
            <div class="scan-container">
                <select id="activeStation" onchange="updateView()"></select>
                <button onclick="exportToExcel()" style="color:var(--accent); border:1px solid var(--accent); background:none; border-radius:5px;">Reporte</button>
                <input type="text" id="barcodeInput" placeholder="Escanea..." autofocus>
                <button onclick="processScan()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:6px; font-weight:bold;">REGISTRAR</button>
                <button onclick="clearStationData()" style="background:var(--danger); color:white; border:none; padding:10px; border-radius:6px; font-weight:bold;">LIMPIAR</button>
            </div>
        </div>
        <div class="table-header-fixed">
            <div class="header-row">
                <span>UBIC</span><span>PITS</span><span>CÓDIGO</span><span>ESTADO</span><span>ACC</span>
            </div>
        </div>
    </div>
    <div class="scroll-area"><div class="table-body-container" id="tableBody"></div></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyClp2tVcoeIE_ZOedIzP6zyEXEoP9Em0tM",
        authDomain: "chatpareja-3fbce.firebaseapp.com",
        databaseURL: "https://chatpareja-3fbce-default-rtdb.firebaseio.com",
        projectId: "chatpareja-3fbce",
        storageBucket: "chatpareja-3fbce.firebasestorage.app",
        messagingSenderId: "954583350974",
        appId: "1:954583350974:web:206cdca70f941872d728ef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let stationsData = {};
    let stationsList = [];
    let codeMap = new Map();

    // Sincronización inicial
    db.ref('picking_live').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            stationsData = data.stationsData || {};
            stationsList = data.stationsList || [];
            codeMap = new Map(Object.entries(data.codeMap || {}));
            if (document.getElementById('mainView').style.display === 'flex') {
                initSelect();
                updateView();
            }
        }
    });

    async function enterLiveSession() {
        const snapshot = await db.ref('picking_live/stationsList').once('value');
        if (!snapshot.exists()) return alert("Carga un Excel");
        stationsList = snapshot.val();
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('mainView').style.display = 'flex';
        initSelect(); updateView();
        setTimeout(() => document.getElementById('barcodeInput').focus(), 100);
    }

    function processScan() {
        const input = document.getElementById('barcodeInput');
        const select = document.getElementById('activeStation');
        const code = input.value.trim();
        const station = select.value;

        if(!code) return;

        // 1. VALIDACIÓN LOCAL RÁPIDA
        if (stationsData[station] && stationsData[station].length >= 1) {
            showNotify("UBICACIÓN OCUPADA", "var(--danger)");
            input.value = ''; return;
        }
        if(codeMap.has(code)) {
            showNotify(`DUPLICADO: ${codeMap.get(code)}`, "var(--danger)");
            input.value = ''; return;
        }

        // 2. ACTUALIZACIÓN LOCAL INSTANTÁNEA (Microsegundos)
        const newEntry = { code: code, time: new Date().toLocaleTimeString() };
        
        // Actualizamos las variables locales antes que Firebase
        if(!stationsData[station]) stationsData[station] = [];
        stationsData[station] = [newEntry];
        codeMap.set(code, station);

        // Cambiamos de estación en la interfaz de inmediato
        const nextIdx = (stationsList.indexOf(station) + 1) % stationsList.length;
        select.value = stationsList[nextIdx];
        input.value = '';
        input.focus();
        
        // Refrescamos la tabla localmente sin esperar al servidor
        updateView(); 

        // 3. SINCRONIZACIÓN ASÍNCRONA CON FIREBASE (En segundo plano)
        db.ref(`picking_live/stationsData/${station}`).set([newEntry]);
        db.ref(`picking_live/codeMap/${code}`).set(station);
    }

    function updateView() {
        const container = document.getElementById('tableBody');
        const active = document.getElementById('activeStation').value;
        if (!container || !active) return;

        let html = '';
        stationsList.forEach(name => {
            const isActive = (name === active);
            const currentData = stationsData[name] || [];
            const hasData = currentData.length > 0;
            const lastCode = hasData ? currentData[0].code : '-';
            
            html += `
                <div class="data-row ${isActive ? 'active-row' : ''}" id="${isActive ? 'activeRow' : ''}">
                    <div style="font-weight:bold">${name}</div>
                    <div><span class="count-badge">${currentData.length}</span></div>
                    <div style="font-family:monospace; color:#94a3b8">${lastCode}</div>
                    <div>${isActive ? '<span class="status-scanning">LISTO</span>' : (hasData ? '<span class="status-completed">OK</span>' : '-')}</div>
                    <div>${hasData ? `<button class="btn-del" onclick="deleteItem('${name}', '${lastCode}')">X</button>` : ''}</div>
                </div>`;
        });
        container.innerHTML = html;

        const activeRow = document.getElementById('activeRow');
        if(activeRow) activeRow.scrollIntoView({ behavior: 'auto', block: 'nearest' });
    }

    // Funciones de soporte (iguales a las originales)
    function initSelect() {
        const select = document.getElementById('activeStation');
        const current = select.value;
        select.innerHTML = stationsList.map(n => `<option value="${n}">${n}</option>`).join('');
        if(current && stationsList.includes(current)) select.value = current;
    }

    function deleteItem(station, code) {
        if(!confirm(`¿Eliminar ${code}?`)) return;
        stationsData[station] = [];
        codeMap.delete(code);
        updateView();
        db.ref(`picking_live/stationsData/${station}`).set([]);
        db.ref(`picking_live/codeMap/${code}`).remove();
    }

    function showNotify(t, c) {
        const m = document.getElementById('msg');
        m.innerHTML = t; m.style.backgroundColor = c;
        m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 2000);
    }

    document.getElementById('barcodeInput').addEventListener('keypress', e => { if(e.key === 'Enter') processScan(); });

    document.getElementById('excelInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const json = XLSX.utils.sheet_to_json(XLSX.read(data, {type: 'array'}).Sheets[XLSX.read(data, {type: 'array'}).SheetNames[0]]);
            let tempStationsData = {}; let tempStationsList = [];
            json.forEach(row => {
                const name = row.Estacion || row.Nombre || row.UBICACION || Object.values(row)[0];
                if(name && !tempStationsData[name]) { tempStationsData[name] = []; tempStationsList.push(name); }
            });
            db.ref('picking_live').set({ stationsData: tempStationsData, stationsList: tempStationsList, codeMap: {} }).then(() => enterLiveSession());
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function clearStationData() {
        if(!confirm("¿BORRAR TODO?")) return;
        stationsList.forEach(st => { stationsData[st] = []; });
        codeMap.clear();
        updateView();
        db.ref('picking_live/codeMap').set({});
        stationsList.forEach(st => db.ref(`picking_live/stationsData/${st}`).set([]));
    }

    function exportToExcel() {
        let exportData = [];
        stationsList.forEach(st => (stationsData[st] || []).forEach(item => exportData.push({ Ubicacion: st, Codigo: item.code })));
        XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(exportData), "Picking"), "Reporte.xlsx");
    }
</script>
</body>
</html>
