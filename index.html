<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picking Oriflame</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0f19; --panel: #1e293b; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --border: #334155; --text: #f1f5f9; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        .layout { display: flex; flex-direction: column; height: 100vh; }
        .top-container { flex-shrink: 0; z-index: 1000; background: var(--bg); }
        .header-fixed { background: var(--panel); padding: 15px 25px; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .scan-container { display: grid; grid-template-columns: 220px 1fr auto auto; gap: 15px; background: rgba(56, 189, 248, 0.07); padding: 10px; border-radius: 8px; border: 1px solid var(--accent); }
        input, select { padding: 10px; background: #0b0f19; border: 1px solid var(--border); color: white; border-radius: 6px; outline: none; }
        .table-header-fixed { background: #1a2233; padding: 0 25px; border-bottom: 2px solid var(--accent); }
        .header-row { display: grid; grid-template-columns: 1.5fr 1fr 2fr 1fr 0.5fr; max-width: 1300px; margin: 0 auto; padding: 15px 20px; }
        .header-row span { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 0 25px 40px 25px; }
        .table-body-container { background: var(--panel); border-radius: 0 0 12px 12px; border: 1px solid var(--border); width: 100%; max-width: 1300px; margin: 0 auto; }
        .data-row { display: grid; grid-template-columns: 1.5fr 1fr 2fr 1fr 0.5fr; padding: 12px 20px; border-bottom: 1px solid var(--border); align-items: center; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
        .data-row:hover { background: rgba(255,255,255,0.05); }
        .active-row { background: rgba(56, 189, 248, 0.2) !important; border-left: 5px solid var(--accent); scroll-margin-top: 10px; }
        .status-completed { color: var(--success); font-weight: bold; }
        .status-scanning { color: var(--accent); font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }
        .count-badge { background: var(--accent); color: #000; padding: 2px 12px; border-radius: 15px; font-weight: bold; display: inline-block; }
        .btn-del { background: var(--danger); border: none; color: white; cursor: pointer; border-radius: 4px; padding: 4px 8px; font-weight: bold; }
        #msg { position: fixed; top: 20px; right: 20px; padding: 20px; border-radius: 10px; display: none; z-index: 2000; font-weight: bold; }
        .menu-container { display: flex; flex-direction: column; gap: 20px; text-align: center; }
        .btn-menu { padding: 20px 40px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: 2px solid var(--accent); transition: 0.3s; }
        .btn-load { background: var(--accent); color: #000; }
        .btn-enter { background: transparent; color: var(--accent); }
    </style>
</head>
<body>
<div id="msg"></div>
<div id="welcomeView" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div class="menu-container">
        <h2 style="color:var(--accent); margin-bottom: 30px;">SISTEMA DE PICKING ORIFLAME</h2>
        <label class="btn-menu btn-load">CARGAR LINEA DE PICKING<input type="file" id="excelInput" hidden accept=".xlsx, .xls"></label>
        <button class="btn-menu btn-enter" onclick="enterLiveSession()">PANEL DE PITADO</button>
    </div>
</div>
<div id="mainView" class="layout" style="display: none;">
    <div class="top-container">
        <div class="header-fixed">
            <div class="header-top">
                <h3 style="margin:0;">LINEA DE PICKING <small style="color:var(--accent)">| Oriflame</small></h3>
                <div>
                    <button onclick="location.reload()" style="background:transparent; border:1px solid #94a3b8; color:#94a3b8; padding:5px 15px; border-radius:5px; cursor:pointer; margin-right: 10px;">Volver al Menú</button>
                    <button onclick="exportToExcel()" style="background:transparent; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; border-radius:5px; cursor:pointer;">Exportar Reporte</button>
                </div>
            </div>
            <div class="scan-container">
                <select id="activeStation" onchange="updateView()"></select>
                <input type="text" id="barcodeInput" placeholder="Escanea código aquí..." autofocus>
                <button onclick="processScan()" style="background:var(--success); border:none; color:white; border-radius:6px; cursor:pointer; font-weight:bold; padding: 10px 20px;">REGISTRAR</button>
                <button onclick="clearStationData()" style="background:var(--danger); border:none; color:white; border-radius:6px; cursor:pointer; font-weight:bold; padding: 10px 20px;">LIMPIAR TODO</button>
            </div>
        </div>
        <div class="table-header-fixed"><div class="header-row"><span>Ubicación</span><span>Pitado</span><span>Código</span><span>Estado</span><span>Acción</span></div></div>
    </div>
    <div class="scroll-area"><div class="table-body-container" id="tableBody"></div></div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyClp2tVcoeIE_ZOedIzP6zyEXEoP9Em0tM", authDomain: "chatpareja-3fbce.firebaseapp.com", databaseURL: "https://chatpareja-3fbce-default-rtdb.firebaseio.com", projectId: "chatpareja-3fbce", storageBucket: "chatpareja-3fbce.firebasestorage.app", messagingSenderId: "954583350974", appId: "1:954583350974:web:206cdca70f941872d728ef" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let stationsData = {}; let stationsList = []; let codeMap = new Map();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, type, duration) {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq; osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration); osc.stop(audioCtx.currentTime + duration);
    }

    db.ref('picking_live').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            stationsData = data.stationsData || {}; stationsList = data.stationsList || [];
            codeMap = new Map(Object.entries(data.codeMap || {}));
            if (document.getElementById('mainView').style.display === 'flex') { updateSelectOptions(); updateView(); }
        }
    });

    async function enterLiveSession() {
        const snapshot = await db.ref('picking_live/stationsList').once('value');
        const list = snapshot.val();
        if (!list) return showNotify("No hay estaciones cargadas. Por favor carga un Excel.", "var(--danger)");
        stationsList = list; document.getElementById('welcomeView').style.display = 'none'; document.getElementById('mainView').style.display = 'flex';
        updateSelectOptions(); updateView(); setTimeout(() => document.getElementById('barcodeInput').focus(), 100);
    }

    document.getElementById('excelInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = new Uint8Array(event.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            let tempSD = {}; let tempSL = [];
            json.forEach(row => { const n = row.Estacion || row.UBICACION || Object.values(row)[0]; if(n && !tempSD[n]) { tempSD[n] = []; tempSL.push(n); } });
            db.ref('picking_live').set({ stationsData: tempSD, stationsList: tempSL, codeMap: {} }).then(() => enterLiveSession());
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function updateSelectOptions() {
        const select = document.getElementById('activeStation');
        const current = select.value;
        if(select.options.length === stationsList.length) return;
        select.innerHTML = '';
        stationsList.forEach(n => { let o = document.createElement('option'); o.value = n; o.textContent = n; select.appendChild(o); });
        if(current && stationsList.includes(current)) select.value = current;
    }

    // Función para seleccionar estación con el mouse
    function selectStation(name) {
        const select = document.getElementById('activeStation');
        select.value = name;
        updateView();
        document.getElementById('barcodeInput').focus();
    }

    function updateView() {
        const container = document.getElementById('tableBody');
        const active = document.getElementById('activeStation').value;
        if (!container || !active) return;
        container.innerHTML = '';
        stationsList.forEach(name => {
            const isActive = (name === active); const cur = stationsData[name] || []; const has = cur.length > 0;
            const row = document.createElement('div'); row.className = 'data-row' + (isActive ? ' active-row' : '');
            if(isActive) row.id = 'activeRow';
            
            // Evento Click para seleccionar con mouse
            row.onclick = () => selectStation(name);

            let statusHtml = isActive ? '<span class="status-scanning">● MI UBICACIÓN</span>' : 
                             (has ? '<span class="status-completed">✓ COMPLETADO</span>' : '<span style="color:#475569">Esperando</span>');

            row.innerHTML = `<div><b>${name}</b></div><div><span class="count-badge">${cur.length}</span></div>
                <div style="font-family:monospace; color:#94a3b8">${cur[0]?.code || '-'}</div>
                <div>${statusHtml}</div>
                <div>${has ? `<button class="btn-del" onclick="event.stopPropagation(); deleteItem('${name}', '${cur[0].code}')">X</button>` : ''}</div>`;
            container.appendChild(row);
        });
        document.getElementById('activeRow')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function processScan() {
        const input = document.getElementById('barcodeInput');
        const select = document.getElementById('activeStation');
        const code = input.value.trim();
        const station = select.value;

        if (!code) { irASiguienteEstacion(select); updateView(); input.focus(); return; }

        if ((stationsData[station] || []).length >= 1) {
            playTone(150, 'sawtooth', 0.5); showNotify(`ERROR: ${station} ocupada`, 'var(--danger)');
            input.value = ''; irASiguienteEstacion(select); updateView(); return;
        }

        if (codeMap.has(code)) {
            playTone(150, 'sawtooth', 0.5); showNotify(`DUPLICADO: Ubicación ${codeMap.get(code)}`, 'var(--danger)');
            input.value = ''; return;
        }

        playTone(880, 'sine', 0.1);
        const entry = { code: code, time: new Date().toLocaleTimeString() };
        stationsData[station] = [entry]; codeMap.set(code, station);
        irASiguienteEstacion(select); updateView(); input.value = ''; input.focus();
        
        const up = {}; up[`picking_live/stationsData/${station}`] = [entry]; up[`picking_live/codeMap/${code}`] = station;
        db.ref().update(up);
    }

    function irASiguienteEstacion(s) { s.value = stationsList[(stationsList.indexOf(s.value) + 1) % stationsList.length]; }
    function deleteItem(s, c) { if(confirm(`¿Eliminar el código ${c}?`)) { db.ref(`picking_live/stationsData/${s}`).set([]); db.ref(`picking_live/codeMap/${c}`).remove(); }}
    function clearStationData() { if(confirm("¿BORRAR TODOS los códigos de TODAS las estaciones?")) { db.ref('picking_live/codeMap').set({}); stationsList.forEach(s => db.ref(`picking_live/stationsData/${s}`).set([])); }}
    document.getElementById('barcodeInput').addEventListener('keypress', e => { if(e.key === 'Enter') processScan(); });
    function showNotify(t, c) { const m = document.getElementById('msg'); m.innerHTML = t; m.style.backgroundColor = c; m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 3000); }
    function exportToExcel() {
        let exportData = [];
        stationsList.forEach(st => { (stationsData[st] || []).forEach(item => { exportData.push({ Ubicacion: st, Codigo: item.code }); }); });
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Picking"); XLSX.writeFile(wb, "Reporte_Picking_Line.xlsx");
    }
</script>
</body>
</html>
